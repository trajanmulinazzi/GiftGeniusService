services:
  postgres:
    image: postgres:16
    container_name: giftgenius-postgres
    environment:
      POSTGRES_USER: giftgenius
      POSTGRES_PASSWORD: giftgenius
      POSTGRES_DB: giftgenius
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
