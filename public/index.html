<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftGenius</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
  .app { max-width: 420px; width: 100%; }
  h1 { text-align: center; margin-bottom: 20px; font-size: 24px; }
  .panel { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .panel h2 { font-size: 16px; margin-bottom: 12px; color: #555; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
  select, input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 10px; }
  button { padding: 10px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  .btn-primary { background: #4f46e5; color: #fff; width: 100%; }
  .btn-primary:hover:not(:disabled) { background: #4338ca; }
  .hidden { display: none !important; }

  /* Card */
  .card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.1); margin-bottom: 16px; }
  .card img { width: 100%; height: 300px; object-fit: contain; background: #fafafa; }
  .card-body { padding: 16px; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
  .card-price { font-size: 18px; font-weight: 700; color: #16a34a; margin-bottom: 4px; }
  .card-tags { font-size: 12px; color: #999; }

  /* Action buttons */
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .actions button { padding: 14px; font-size: 15px; border-radius: 12px; }
  .btn-shop { background: #16a34a; color: #fff; }
  .btn-save { background: #2563eb; color: #fff; }
  .btn-skip { background: #e5e7eb; color: #555; }
  .btn-dislike { background: #fecaca; color: #b91c1c; }

  .status { text-align: center; color: #888; font-size: 13px; padding: 20px 0; }
  .loading { text-align: center; padding: 40px 0; color: #888; }

  /* Create form rows */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-row.full { grid-template-columns: 1fr; }

  /* Saved items */
  .saved-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
  .saved-item img { width: 60px; height: 60px; object-fit: contain; border-radius: 6px; background: #fafafa; }
  .saved-item-info { flex: 1; min-width: 0; }
  .saved-item-title { font-size: 13px; line-height: 1.3; }
  .saved-item-price { font-size: 13px; font-weight: 600; color: #16a34a; }

  .tab-bar { display: flex; gap: 0; margin-bottom: 16px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
  .tab-bar button { flex: 1; padding: 10px; background: #fff; border: none; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; }
  .tab-bar button.active { background: #4f46e5; color: #fff; }
</style>
</head>
<body>
<div class="app">
  <h1>GiftGenius</h1>

  <!-- Setup Panel -->
  <div id="setup">
    <div class="panel">
      <h2>Select User</h2>
      <select id="userSelect"><option value="">Loading...</option></select>
      <div id="newUserForm" class="hidden">
        <input id="newUserName" placeholder="Name">
        <input id="newUserEmail" placeholder="Email">
        <button class="btn-primary" onclick="createNewUser()">Create User</button>
      </div>
    </div>
    <div id="feedPanel" class="panel hidden">
      <h2>Select Feed</h2>
      <select id="feedSelect"><option value="">Pick a feed...</option></select>
      <div id="newFeedForm" class="hidden">
        <input id="feedName" placeholder="Name (e.g. Mom)">
        <input id="feedRelationship" placeholder="Relationship (e.g. mom, friend)">
        <input id="feedInterests" placeholder="Interests (comma separated)">
        <div class="form-row">
          <input id="feedBudgetMin" type="number" placeholder="Budget min ($)">
          <input id="feedBudgetMax" type="number" placeholder="Budget max ($)">
        </div>
        <button class="btn-primary" onclick="createNewFeed()">Create Feed</button>
      </div>
      <button id="startBtn" class="btn-primary hidden" style="margin-top:8px" onclick="startFeed()">Start Swiping</button>
    </div>
  </div>

  <!-- Feed View -->
  <div id="feedView" class="hidden">
    <div class="tab-bar">
      <button class="active" onclick="showTab('swipe')">Feed</button>
      <button onclick="showTab('saved')">Saved</button>
    </div>

    <div id="swipeTab">
      <div id="cardArea"></div>
      <div id="actions" class="actions hidden">
        <button class="btn-shop" onclick="act('shop')">Shop</button>
        <button class="btn-save" onclick="act('save')">Save</button>
        <button class="btn-skip" onclick="act('scroll_past')">Skip</button>
        <button class="btn-dislike" onclick="act('dislike')">Dislike</button>
      </div>
      <div class="status" id="queueStatus"></div>
    </div>

    <div id="savedTab" class="hidden">
      <div class="panel" id="savedList"><div class="loading">Loading saved items...</div></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let token = null;
let currentUserId = null;
let currentFeedId = null;
let items = [];
let itemIndex = 0;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || res.statusText);
  return data;
}

// --- Setup ---

async function loadUsers() {
  const { users } = await api('GET', '/users');
  const sel = document.getElementById('userSelect');
  sel.innerHTML = '<option value="">Pick a user...</option><option value="__new__">+ Create new user</option>';
  for (const u of users) {
    sel.innerHTML += `<option value="${u.id}" data-email="${u.email || ''}">${u.name}${u.email ? ` (${u.email})` : ''}</option>`;
  }
  sel.onchange = () => {
    const v = sel.value;
    document.getElementById('newUserForm').classList.toggle('hidden', v !== '__new__');
    if (v && v !== '__new__') {
      currentUserId = Number(v);
      loadFeeds();
    } else {
      document.getElementById('feedPanel').classList.add('hidden');
    }
  };
}

async function createNewUser() {
  const name = document.getElementById('newUserName').value.trim();
  const email = document.getElementById('newUserEmail').value.trim();
  if (!name) return alert('Name required');
  const user = await api('POST', '/users', { name, email: email || undefined });
  currentUserId = user.id;
  await loadUsers();
  document.getElementById('userSelect').value = String(user.id);
  document.getElementById('newUserForm').classList.add('hidden');
  loadFeeds();
}

async function loadFeeds() {
  const panel = document.getElementById('feedPanel');
  panel.classList.remove('hidden');
  const { feeds } = await api('GET', `/feeds?userId=${currentUserId}`);
  const sel = document.getElementById('feedSelect');
  sel.innerHTML = '<option value="">Pick a feed...</option><option value="__new__">+ Create new feed</option>';
  for (const f of feeds) {
    sel.innerHTML += `<option value="${f.id}">${f.name}${f.relationship ? ` (${f.relationship})` : ''}</option>`;
  }
  sel.onchange = () => {
    const v = sel.value;
    document.getElementById('newFeedForm').classList.toggle('hidden', v !== '__new__');
    document.getElementById('startBtn').classList.toggle('hidden', !v || v === '__new__');
    if (v && v !== '__new__') currentFeedId = Number(v);
  };
}

async function createNewFeed() {
  const name = document.getElementById('feedName').value.trim();
  const relationship = document.getElementById('feedRelationship').value.trim();
  const interests = document.getElementById('feedInterests').value.split(',').map(s => s.trim()).filter(Boolean);
  const budgetMin = document.getElementById('feedBudgetMin').value;
  const budgetMax = document.getElementById('feedBudgetMax').value;
  if (!name) return alert('Name required');
  const feed = await api('POST', '/feeds', {
    userId: currentUserId,
    name,
    relationship: relationship || undefined,
    interests: interests.length ? interests : undefined,
    budgetMin: budgetMin ? Number(budgetMin) : undefined,
    budgetMax: budgetMax ? Number(budgetMax) : undefined,
  });
  currentFeedId = feed.id;
  await loadFeeds();
  document.getElementById('feedSelect').value = String(feed.id);
  document.getElementById('newFeedForm').classList.add('hidden');
  document.getElementById('startBtn').classList.remove('hidden');
}

async function startFeed() {
  // Login to get JWT
  const sel = document.getElementById('userSelect');
  const opt = sel.options[sel.selectedIndex];
  const email = opt?.dataset?.email;
  if (!email) return alert('User needs an email to login. Create a user with an email.');
  try {
    const auth = await api('POST', '/auth/login', { email });
    token = auth.accessToken;
  } catch (e) {
    return alert('Login failed: ' + e.message);
  }

  document.getElementById('setup').classList.add('hidden');
  document.getElementById('feedView').classList.remove('hidden');
  await loadBatch();
}

// --- Feed ---

async function loadBatch() {
  const area = document.getElementById('cardArea');
  area.innerHTML = '<div class="loading">Loading gift ideas...</div>';
  document.getElementById('actions').classList.add('hidden');
  try {
    const data = await api('GET', `/feeds/${currentFeedId}/next?count=6`);
    items = data.items;
    itemIndex = 0;
    document.getElementById('queueStatus').textContent = `${data.queueRemaining} more in queue`;
    showCurrentItem();
  } catch (e) {
    area.innerHTML = `<div class="status">No items available. Try again later.</div>`;
  }
}

function showCurrentItem() {
  const area = document.getElementById('cardArea');
  if (itemIndex >= items.length) {
    loadBatch();
    return;
  }
  const item = items[itemIndex];
  const price = item.priceCents != null ? `$${(item.priceCents / 100).toFixed(2)}` : '';
  const img = item.imageUrl
    ? `<img src="${item.imageUrl}" alt="" onerror="this.style.display='none'">`
    : '';
  area.innerHTML = `
    <div class="card">
      ${img}
      <div class="card-body">
        ${price ? `<div class="card-price">${price}</div>` : ''}
        <div class="card-title">${escHtml(item.title)}</div>
        <div class="card-tags">${(item.tags || []).join(', ')}</div>
      </div>
    </div>`;
  document.getElementById('actions').classList.remove('hidden');
}

async function act(type) {
  const item = items[itemIndex];
  if (!item) return;

  // Disable buttons during request
  const btns = document.querySelectorAll('.actions button');
  btns.forEach(b => b.disabled = true);

  try {
    await api('POST', `/feeds/${currentFeedId}/interactions`, {
      catalogItemId: item.id,
      type,
    });

    if (type === 'shop' && item.buyUrl) {
      window.open(item.buyUrl, '_blank');
    }
  } catch (e) {
    console.error('Interaction failed:', e);
  }

  btns.forEach(b => b.disabled = false);
  itemIndex++;
  showCurrentItem();
}

// --- Tabs ---

function showTab(tab) {
  document.getElementById('swipeTab').classList.toggle('hidden', tab !== 'swipe');
  document.getElementById('savedTab').classList.toggle('hidden', tab !== 'saved');
  document.querySelectorAll('.tab-bar button').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'swipe') || (i === 1 && tab === 'saved'));
  });
  if (tab === 'saved') loadSaved();
}

async function loadSaved() {
  const list = document.getElementById('savedList');
  list.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const { items: saved } = await api('GET', `/feeds/${currentFeedId}/saved`);
    if (!saved.length) {
      list.innerHTML = '<div class="status">No saved items yet.</div>';
      return;
    }
    list.innerHTML = saved.map(item => {
      const price = item.priceCents != null ? `$${(item.priceCents / 100).toFixed(2)}` : '';
      const img = item.imageUrl ? `<img src="${item.imageUrl}" alt="">` : '';
      return `<div class="saved-item" ${item.buyUrl ? `onclick="window.open('${escAttr(item.buyUrl)}','_blank')" style="cursor:pointer"` : ''}>
        ${img}
        <div class="saved-item-info">
          <div class="saved-item-title">${escHtml(item.title)}</div>
          ${price ? `<div class="saved-item-price">${price}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    list.innerHTML = '<div class="status">Failed to load saved items.</div>';
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
function escAttr(s) {
  return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// Boot
loadUsers();
</script>
</body>
</html>
